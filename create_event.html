<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>建立訂單 - 曾可愛家族點餐系統</title>
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/create_event_style.css" />
    <link rel="stylesheet" href="css/loading.css" />
    <link rel="stylesheet" href="css/copyright_style.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <div class="wrap">
      <h1 class="page-title anim-fade-up">建立訂單</h1>

      <div id="createCard" class="card anim-fade-up anim-fade-up-d1">
        <label>選擇訂單類型</label>
        <div class="category-toggle">
          <button type="button" id="btnDrink" class="toggle-btn active">飲料</button>
          <button type="button" id="btnFood" class="toggle-btn">餐點</button>
        </div>

        <label for="shopSelect">店家</label>
        <select id="shopSelect" class="select-like" required></select>
        <p id="shopError" class="field-error hidden" role="alert">請先選擇店家。</p>

        <div id="otherBox" class="hidden">
          <input id="shopOther" placeholder="請輸入店家名稱" />
          <p id="shopOtherError" class="field-error hidden" role="alert">請輸入店家名稱。</p>
        </div>

        <label for="deadline">截止時間</label>
        <input id="deadline" type="datetime-local" required />
        <p id="deadlineError" class="field-error hidden" role="alert">請先選擇截止時間。</p>

        <div class="actions">
          <a class="back-home" href="index.html">返回首頁</a>
          <button class="primary" id="createBtn" type="button">建立訂單</button>
        </div>

        <div id="result" class="hidden">
          <hr class="divider" />
          <button id="directGoBtn" type="button">直接前往下單頁</button>
          <hr class="divider" />
          <label>分享訊息範本</label>
          <textarea id="shareMsg" class="share-textarea" readonly rows="5"></textarea>
          <div class="actions action-gap">
            <button class="primary" id="copyBtn" type="button">複製分享訊息</button>
          </div>
        </div>
      </div>
    </div>

    <div id="loadingOverlay">
      <div class="spinner-box">
        <div class="spinner"></div>
        <div class="spinner-text">建立訂單中，請稍候...</div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2025 - 2026 曾可愛家族點餐系統</p>
        <p class="disclaimer">本系統僅供內部點餐使用，實際商品與價格請以店家公告為準。</p>
      </div>
    </footer>

    <script type="module">
      import { supabase } from "./config.js";
      import { getEventCode } from "./event-utils.js";
      import { initNavbar } from "./navbar.js";
      import { SHOPS } from "./shop-data.js";
      import { showToast, overrideAlert, initRipple } from "./ui-utils.js";

      initNavbar();
      overrideAlert();
      initRipple(".primary, .back-home, .toggle-btn, #directGoBtn");

      let currentCategory = "drink";
      const shopSelect = document.querySelector("#shopSelect");
      const otherBox = document.querySelector("#otherBox");
      const shopOther = document.querySelector("#shopOther");
      const deadlineInput = document.querySelector("#deadline");
      const btnDrink = document.getElementById("btnDrink");
      const btnFood = document.getElementById("btnFood");
      const shopError = document.getElementById("shopError");
      const shopOtherError = document.getElementById("shopOtherError");
      const deadlineError = document.getElementById("deadlineError");

      function setFieldError(inputEl, errorEl, message) {
        const hasError = Boolean(message);
        inputEl.classList.toggle("input-error", hasError);
        errorEl.textContent = message || "";
        errorEl.classList.toggle("hidden", !hasError);
      }

      function validateForm() {
        const selectedShop = shopSelect.value;
        const isCustomShop = selectedShop === "__other";
        const shop = isCustomShop ? shopOther.value.trim() : selectedShop.trim();
        const deadline = deadlineInput.value;

        setFieldError(shopSelect, shopError, !selectedShop ? "請先選擇店家。" : "");
        setFieldError(shopOther, shopOtherError, isCustomShop && !shop ? "請輸入店家名稱。" : "");
        setFieldError(deadlineInput, deadlineError, !deadline ? "請先選擇截止時間。" : "");

        const firstInvalidField =
          (!selectedShop && shopSelect) ||
          (isCustomShop && !shop && shopOther) ||
          (!deadline && deadlineInput);

        return {
          isValid: Boolean(selectedShop && shop && deadline),
          shop,
          deadline,
          firstInvalidField,
        };
      }

      function updateShopList(category) {
        currentCategory = category;
        shopSelect.innerHTML = '<option value="" selected>請選擇店家</option>';
        Object.entries(SHOPS)
          .filter(([, shop]) => shop.category === category)
          .forEach(([, shop]) => {
            const opt = document.createElement("option");
            opt.value = shop.name;
            opt.textContent = shop.name;
            shopSelect.appendChild(opt);
          });
        shopSelect.innerHTML += '<option value="__other">其他（自訂）</option>';

        otherBox.classList.add("hidden");
        shopOther.value = "";
        validateForm();
      }

      btnDrink.onclick = () => {
        btnDrink.classList.add("active");
        btnFood.classList.remove("active");
        updateShopList("drink");
      };

      btnFood.onclick = () => {
        btnFood.classList.add("active");
        btnDrink.classList.remove("active");
        updateShopList("food");
      };

      shopSelect.addEventListener("change", () => {
        if (shopSelect.value === "__other") {
          otherBox.classList.remove("hidden");
        } else {
          otherBox.classList.add("hidden");
          shopOther.value = "";
          setFieldError(shopOther, shopOtherError, "");
        }
        validateForm();
      });

      shopOther.addEventListener("input", validateForm);
      deadlineInput.addEventListener("input", validateForm);

      async function createEvent() {
        const { isValid, shop, deadline, firstInvalidField } = validateForm();

        if (!isValid) {
          showToast("請先補齊店家與截止時間後再建立訂單。", "warning");
          firstInvalidField?.focus();
          return;
        }

        document.getElementById("loadingOverlay").style.display = "flex";
        try {
          const { data, error } = await supabase
            .from("events")
            .insert([
              {
                title: `${shop} 訂單`,
                shop,
                category: currentCategory,
                deadline: new Date(deadline).toISOString(),
                status: "open",
              },
            ])
            .select();

          if (error) throw error;

          const id = data[0].id;
          const shortId = getEventCode(id);
          const orderURL = new URL("order.html", location.href);
          orderURL.searchParams.set("event", shortId);

          const d = new Date(deadline);
          const deadlineText = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;

          const finalMsg = `你好，這是 ${shop} 的訂單，請你於 ${deadlineText} 之前進行點餐。\n\n點餐連結：${orderURL.toString()}`;
          document.querySelector("#shareMsg").value = finalMsg;
          const resultEl = document.querySelector("#result");
          resultEl.classList.remove("hidden");
          resultEl.classList.add("anim-fade-up");

          showToast("訂單建立成功。", "success");

          document.getElementById("directGoBtn").onclick = () => {
            location.href = orderURL.toString();
          };
          document.querySelector("#copyBtn").onclick = async () => {
            await navigator.clipboard.writeText(finalMsg);
            showToast("分享訊息已複製到剪貼簿。", "success");
          };
        } catch (err) {
          showToast(`建立訂單失敗：${err.message}`, "error", 5000);
        } finally {
          document.getElementById("loadingOverlay").style.display = "none";
        }
      }

      document.querySelector("#createBtn").onclick = createEvent;
      updateShopList("drink");
    </script>
  </body>
</html>
