<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>首頁 - 曾可愛家族點餐系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Sora:wght@500;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/index_style.css" />
    <link rel="stylesheet" href="css/usage_flow.css" />
    <link rel="stylesheet" href="css/copyright_style.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <div class="page-wrap">
      <div class="title-wrap anim-fade-up">
        <h1 class="title">首頁</h1>
      </div>

      <section class="announce-card anim-fade-up anim-fade-up-d1" aria-labelledby="announce-title">
        <div class="announce-header-wrap">
          <div>
            <p class="announce-eyebrow">Update Feed</p>
            <div class="announce-header" id="announce-title">最新公告</div>
          </div>
        </div>
        <div id="announce-list"></div>
      </section>

      <div id="usage-flow-slot"></div>

      <div id="linebot-guide-slot"></div>
    </div>

    <div class="fab-group">
      <button class="fab fab-line" id="fabLine" title="加入 LINE Bot" type="button">
        <img src="/line_icon/line_icon.jpeg" alt="LINE" class="fab-line-img" />
      </button>
      <button class="fab fab-top" id="fabTop" title="回到頂部" type="button">↑</button>
    </div>

    <div class="modal-overlay" id="lineModal">
      <div class="modal-box">
        <button class="modal-close" id="modalClose" type="button">×</button>
        <h2>加入 LINE Bot</h2>
        <p>掃描下方 QR Code 就能快速加入，<br />之後可直接在 LINE 中查詢訂單資訊。</p>
        <img src="/linebot_qrcode/preview.webp" alt="LINE Bot QR Code" />
        <br />
        <a class="modal-line-btn" href="https://line.me/R/ti/p/@962ujidb" target="_blank" rel="noreferrer">前往 LINE 加入</a>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2025 - 2026 曾可愛家族點餐系統</p>
        <p class="disclaimer">本站所有品牌標誌及菜單資訊之著作權均屬原公司所有。本系統為非營利開發練習，與上述品牌無官方關聯。</p>
      </div>
    </footer>

    <script type="module">
      import { initNavbar } from "./navbar.js";
      import { initRipple } from "./ui-utils.js";
      import usageFlowHtml from "./usage_flow.html?raw";
      import linebotGuideHtml from "./linebot_guide.html?raw";

      initNavbar();
      initRipple(".fab, .modal-line-btn, .modal-close, .sw-btn, .sw-dot");

      const ANNOUNCEMENTS = [
        {
          date: "2026/04/29",
          tag: "優化",
          title: "新增手搖店菜單",
          text: "新增兩家手搖飲菜單(特好喝/拾汣茶屋)",
        },
        {
          date: "2026/04/09",
          tag: "優化",
          title: "新增手搖店菜單",
          text: "新增三家手搖飲菜單(coco都可/TEA TOP第一味/五桐號)",
        },
        {
          date: "2026/03/31",
          tag: "新功能",
          title: "首頁加入使用流程導覽",
          text: "第一次使用的使用者現在可以直接在首頁快速了解建立訂單、分享、填單與查詢流程。",
        },
        {
          date: "2026/03/23",
          tag: "優化",
          title: "加入各家店的品項(飲料)",
          text: "提供下拉式選單，增加使用者體驗，減少輸入錯誤的機會，讓填單更順暢。",
        },
        {
          date: "2026/03/13",
          tag: "優化",
          title: "查詢入口調整完成",
          text: "查詢頁與後續整理流程更直覺，主揪可以更快找到訂單、統計頁與編輯頁。",
        },
        {
          date: "2026/03/12",
          tag: "優化",
          title: "建立訂單流程更順",
          text: "建立後可直接取得分享連結與訂單代碼，轉貼到群組時更方便。",
        },
        {
          date: "2026/03/10",
          tag: "新功能",
          title: "LINE Bot 已上線",
          text: "現在可以透過 LINE 查詢活動資訊與訂單狀態，減少來回切換頁面的次數。",
        },
      ];

      const announceList = document.getElementById("announce-list");
      const [featuredAnnouncement, ...timelineAnnouncements] = ANNOUNCEMENTS;

      announceList.innerHTML = `
        <article class="announce-featured anim-fade-up" style="animation-delay:120ms">
          <div class="announce-featured-head">
            <span class="announce-tag announce-tag-featured">${featuredAnnouncement.tag}</span>
            <span class="announce-date">${featuredAnnouncement.date}</span>
          </div>
          <h3 class="announce-featured-title">${featuredAnnouncement.title}</h3>
          <p class="announce-featured-content">${featuredAnnouncement.text}</p>
        </article>
        <div class="announce-timeline">
          ${timelineAnnouncements
            .map(
              (item, index) => `
                <article class="announce-item anim-fade-up" style="animation-delay:${index * 70 + 180}ms">
                  <div class="announce-line-dot" aria-hidden="true"></div>
                  <div class="announce-body">
                    <div class="announce-meta">
                      <span class="announce-tag">${item.tag}</span>
                      <span class="announce-date">${item.date}</span>
                    </div>
                    <h3 class="announce-item-title">${item.title}</h3>
                    <p class="announce-content">${item.text}</p>
                  </div>
                </article>
              `,
            )
            .join("")}
        </div>
      `;

      const fabTop = document.getElementById("fabTop");
      const fabLine = document.getElementById("fabLine");
      const lineModal = document.getElementById("lineModal");
      const modalClose = document.getElementById("modalClose");

      fabTop.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      window.addEventListener("scroll", () => {
        fabTop.classList.toggle("show", window.scrollY > 300);
      });

      fabLine.addEventListener("click", () => lineModal.classList.add("show"));
      modalClose.addEventListener("click", () => lineModal.classList.remove("show"));
      lineModal.addEventListener("click", (event) => {
        if (event.target === lineModal) {
          lineModal.classList.remove("show");
        }
      });

      function initUsageFlow(root) {
        const track = root.querySelector(".sw-track");
        const progress = root.querySelector(".sw-progress-fill");
        const counter = root.querySelector(".sw-counter");
        const prevButton = root.querySelector('[data-action="prev"]');
        const nextButton = root.querySelector('[data-action="next"]');
        const dots = [...root.querySelectorAll(".sw-dot")];
        const viewport = root.querySelector(".sw-viewport");
        const total = dots.length;
        let current = 0;
        let touchStartX = 0;

        function goTo(index) {
          current = Math.max(0, Math.min(total - 1, index));
          track.style.transform = `translateX(-${current * 100}%)`;
          progress.style.width = `${((current + 1) / total) * 100}%`;
          counter.textContent = `${current + 1} / ${total}`;
          prevButton.disabled = current === 0;
          nextButton.disabled = current === total - 1;
          dots.forEach((dot, dotIndex) => {
            dot.classList.toggle("active", dotIndex === current);
          });
        }

        prevButton.addEventListener("click", () => goTo(current - 1));
        nextButton.addEventListener("click", () => goTo(current + 1));
        dots.forEach((dot, index) => {
          dot.addEventListener("click", () => goTo(index));
        });

        viewport.addEventListener(
          "touchstart",
          (event) => {
            touchStartX = event.touches[0].clientX;
          },
          { passive: true },
        );

        viewport.addEventListener(
          "touchend",
          (event) => {
            const diff = touchStartX - event.changedTouches[0].clientX;
            if (Math.abs(diff) > 40) {
              goTo(diff > 0 ? current + 1 : current - 1);
            }
          },
          { passive: true },
        );

        root.addEventListener("keydown", (event) => {
          if (event.key === "ArrowRight") goTo(current + 1);
          if (event.key === "ArrowLeft") goTo(current - 1);
        });

        goTo(0);
      }

      function loadUsageFlow() {
        const slot = document.getElementById("usage-flow-slot");

        try {
          slot.innerHTML = usageFlowHtml;
          const section = slot.querySelector(".howto-section");
          if (section) initUsageFlow(section);
        } catch (error) {
          console.error(error);
          slot.innerHTML = `
            <section class="announce-card anim-fade-up anim-fade-up-d2">
              <div class="announce-header">使用流程</div>
              <div class="announce-content">
                流程區塊載入失敗，請稍後重新整理頁面。
              </div>
            </section>
          `;
        }
      }

      function loadLinebotGuide() {
        const slot = document.getElementById("linebot-guide-slot");

        try {
          slot.innerHTML = linebotGuideHtml;
          const section = slot.querySelector(".howto-section");
          if (section) initUsageFlow(section);
        } catch (error) {
          console.error(error);
        }
      }

      loadUsageFlow();
      loadLinebotGuide();
    </script>
  </body>
</html>
