<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>首頁 - 曾可愛家族點餐系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap " rel="stylesheet"/>
    <link rel="stylesheet" href="css/navbar_style.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/index_style.css" />
    <link rel="stylesheet" href="css/copyright_style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <div class="page-wrap">
      <div class="title-wrap">
        <h1 class="title">曾可愛家族點餐系統</h1>
      </div>

      <div class="announce-card">
        <div class="announce-header">系統公告</div>
        <div id="announce-list"></div>
      </div>
    </div>

    <div class="fab-group">
      <button class="fab fab-line" id="fabLine" title="加入 LINE Bot">
        <img src="./line_icon/line_icon.jpeg" alt="LINE" class="fab-line-img" />
      </button>
      <button class="fab fab-top" id="fabTop" title="回到頂端">↑</button>
    </div>

    <div class="modal-overlay" id="lineModal">
      <div class="modal-box">
        <button class="modal-close" id="modalClose">✕</button>
        <h2>加入小九 LINE Bot</h2>
        <p>掃描 QR code 或點下方按鈕加入，<br />即可查詢訂單明細！</p>
        <img src="./linebot_qrcode/preview.webp" alt="LINE Bot QR Code" />
        <br />
        <a class="modal-line-btn" href="https://line.me/R/ti/p/@962ujidb" target="_blank">開啟 LINE 加入</a>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2025 - 2026 曾可愛家族點餐系統</p>
        <p class="disclaimer">本站所有品牌標誌及菜單資訊之著作權均屬原公司所有。本系統為非營利開發練習，與上述品牌無官方關聯。</p>
      </div>
    </footer>

    <script type="module">
      import { initNavbar } from "./navbar.js";
      initNavbar();

      const ANNOUNCEMENTS = [
        {
          date: "2026/03/10",
          text: "加入小九 LINE Bot，可直接透過 LINE 查詢訂單明細，點右下角綠色按鈕加入。",
        },
        {
          date: "2026/03/12",
          text: "修改訂單功能尚未完成，請勿使用。目前點擊下去會導到首頁",
        },
        { date: "2026/03/13", 
          text: "修改訂單功能已更新完成" 
        },
      ];

      const list = document.getElementById("announce-list");
      list.innerHTML = ANNOUNCEMENTS.slice()
        .reverse()
        .map(
          (a) => `
        <div class="announce-item">
          <div class="announce-date">${a.date}</div>
          <div class="announce-content">
            ${a.text}
          </div>
        </div>`,
        )
        .join("");

      const fabTop = document.getElementById("fabTop");
      fabTop.addEventListener("click", () =>
        window.scrollTo({ top: 0, behavior: "smooth" }),
      );
      window.addEventListener("scroll", () => {
        fabTop.classList.toggle("show", window.scrollY > 300);
      });

    const fabLine = document.getElementById("fabLine");
    const lineModal = document.getElementById("lineModal");
    const modalClose = document.getElementById("modalClose");

    fabLine.addEventListener("click", () => {
        console.log("LINE button clicked");
        lineModal.classList.add("show");
    });

    modalClose.addEventListener("click", () => {
        lineModal.classList.remove("show");
    });

    lineModal.addEventListener("click", (e) => {
        if (e.target === lineModal) {
            lineModal.classList.remove("show");
        }
    });
    </script>
  </body>
</html>
