<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#27374d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="家族點餐" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <script type="module" src="./pwa.js"></script>
    <title>菜單 - 訂餐系統</title>
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/copyright_style.css" />
    <link rel="stylesheet" href="css/menu_style.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div id="navbar-root"></div>
    <div id="listView">
      <div class="tab-bar">
        <button class="tab-btn active" data-target="drinkPanel" id="tabDrink">飲料區</button>
        <button class="tab-btn" data-target="foodPanel" id="tabFood">餐點區</button>
      </div>

      <div class="list-wrap">
        <div class="section-panel active" id="drinkPanel">
          <h2 class="section-title">飲料區</h2>
          <div class="shop-grid" id="drinkGrid"></div>
        </div>
        <div class="section-panel" id="foodPanel">
          <h2 class="section-title">餐點區</h2>
          <div class="shop-grid" id="foodGrid"></div>
        </div>
      </div>
    </div>

    <div id="menuView" class="menu-modal" role="dialog" aria-modal="true" aria-label="菜單圖片預覽">
      <button class="menu-close-btn" id="backBtn" type="button" aria-label="關閉菜單">×</button>
      <div class="menu-img-wrap" id="menuImgs"></div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2025 - 2026 曾可愛家族點餐系統</p>
        <p class="disclaimer">本站所有品牌標誌及菜單資訊之著作權均屬原公司所有。本系統為非營利開發練習，與上述品牌無官方關聯。</p>
      </div>
    </footer>

    <script type="module">
      import { initNavbar } from "./navbar.js";
      import { getQueryParam, initRipple, openExternalUrl } from "./ui-utils.js";
      import { SHOPS as SHOP_DATA } from "./shop-data.js";

      const initialShopKey = getQueryParam("shop");
      const isEmbed = getQueryParam("embed") === "1";
      let isMenuOpen = false;

      if (!isEmbed) {
        initNavbar("menu");
        initRipple(".tab-btn, .menu-close-btn, .shop-card");
      }

      const SHOPS = Object.fromEntries(
        Object.entries(SHOP_DATA).map(([key, shop]) => [
          key,
          {
            ...shop,
            type: shop.category === "drink" ? "drinks" : "meals",
          },
        ]),
      );

      const HIDE_SEARCH_LINK_KEYS = new Set(["mcdonalds", "kfc", "burgerking"]);

      function getShopSearchUrl(shop) {
        const keyword = `${shop.name} ${shop.sub || ""} 店家資訊`.trim();
        return `https://www.google.com/search?q=${encodeURIComponent(keyword)}`;
      }

      function renderGrid(gridId, type) {
        const grid = document.getElementById(gridId);
        const entries = Object.entries(SHOPS).filter(([, s]) => s.type === type);

        entries.forEach(([key, s], i) => {
          const logoDir = type === "drinks" ? "drinks" : "meals";
          const el = document.createElement("div");
          el.className = "shop-card";
          el.style.animationDelay = `${i * 45}ms`;
          el.classList.add("anim-fade-up");
          el.innerHTML = `
            <img class="shop-logo" src="./logos/${logoDir}/${s.logo}" alt="${s.name}" loading="lazy" decoding="async" />
            <div class="shop-info">
              <b>${s.name}</b>
              ${s.sub ? `<span>${s.sub}</span>` : ""}
            </div>
            ${
              HIDE_SEARCH_LINK_KEYS.has(key)
                ? ""
                : `<a class="shop-link" href="${getShopSearchUrl(s)}" target="_blank" rel="noreferrer">搜尋店家</a>`
            }`;
          el.querySelector(".shop-link")?.addEventListener("click", (event) => {
            event.stopPropagation();
          });
          el.addEventListener("click", () => openShop(key));
          grid.appendChild(el);
        });
      }

      if (!isEmbed || !initialShopKey || !SHOPS[initialShopKey]) {
        renderGrid("drinkGrid", "drinks");
        renderGrid("foodGrid", "meals");

        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
            document.querySelectorAll(".section-panel").forEach((p) => p.classList.remove("active"));
            btn.classList.add("active");
            const panel = document.getElementById(btn.dataset.target);
            panel.classList.add("active");
            const t = btn.dataset.target === "drinkPanel" ? "drink" : "food";
            history.replaceState(null, "", `menu.html?type=${t}`);
          });
        });
      }

      function openShop(key) {
        const shop = SHOPS[key];
        if (!shop) return;
        if (!shop.imgs?.length && shop.url) {
          openExternalUrl(shop.url);
          return;
        }
        const suffix = isEmbed ? "&embed=1" : "";
        history.pushState({ shop: key }, "", `menu.html?shop=${key}${suffix}`);
        showMenuModal(key);
      }

      function reportEmbedHeight() {
        if (!isEmbed || window.parent === window) return;
        const height = document.documentElement.scrollHeight;
        window.parent.postMessage({ type: "menu-embed-height", height }, "*");
      }

      function showMenuModal(key) {
        const shop = SHOPS[key];
        document.title = `${shop.name} 菜單 - 訂餐系統`;
        const wrap = document.getElementById("menuImgs");
        wrap.innerHTML = "";

        (shop.imgs || []).forEach((imgSrc, i) => {
          if (!imgSrc) return;
          const el = document.createElement("img");
          el.src = `menus/${shop.type}/${imgSrc}`;
          el.alt = `${shop.name} 菜單`;
          el.loading = i === 0 ? "eager" : "lazy";
          el.decoding = "async";
          el.style.animationDelay = `${i * 80}ms`;
          el.classList.add("anim-scale-in");
          wrap.appendChild(el);
        });

        isMenuOpen = true;
        document.getElementById("menuView").classList.add("show");
        document.body.classList.add("menu-modal-open");
        document.querySelector(".footer").style.display = isEmbed ? "none" : "";
        reportEmbedHeight();
      }

      function closeMenuModal({ updateHistory = true } = {}) {
        isMenuOpen = false;
        document.getElementById("menuView").classList.remove("show");
        document.body.classList.remove("menu-modal-open");
        document.querySelector(".footer").style.display = "";
        document.title = "菜單 - 訂餐系統";
        if (updateHistory) {
          const activeType = document.getElementById("tabFood").classList.contains("active") ? "food" : "drink";
          history.replaceState(null, "", `menu.html?type=${activeType}`);
        }
      }

      document.getElementById("backBtn").addEventListener("click", () => closeMenuModal());
      document.getElementById("menuView").addEventListener("click", (event) => {
        if (event.target.id === "menuView") closeMenuModal();
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && isMenuOpen) closeMenuModal();
      });

      window.addEventListener("popstate", () => {
        const shopKey = getQueryParam("shop");
        const type = getQueryParam("type");
        if (shopKey && SHOPS[shopKey]) {
          showMenuModal(shopKey);
        } else {
          closeMenuModal({ updateHistory: false });
          if (type === "food") document.getElementById("tabFood").click();
        }
      });

      (function init() {
        const shopKey = getQueryParam("shop");
        const type = getQueryParam("type");
        if (shopKey && SHOPS[shopKey]) {
          showMenuModal(shopKey);
        } else if (type === "food") {
          document.getElementById("tabFood").click();
        }
      })();

      function setupEmbedMode() {
        if (!isEmbed) return;
        const navbarRoot = document.getElementById("navbar-root");
        const backBtn = document.getElementById("backBtn");
        const footer = document.querySelector(".footer");
        const listView = document.getElementById("listView");
        const menuView = document.getElementById("menuView");

        if (navbarRoot) navbarRoot.style.display = "none";
        if (backBtn) backBtn.style.display = "none";
        if (footer) footer.style.display = "none";
        if (listView) listView.style.display = "none";
        if (menuView) menuView.classList.add("embed-mode");

        const reportHeight = () => {
          if (window.parent === window) return;
          const height = document.documentElement.scrollHeight;
          window.parent.postMessage({ type: "menu-embed-height", height }, "*");
        };

        window.addEventListener("load", reportHeight);
        window.addEventListener("resize", reportHeight);
        if ("ResizeObserver" in window) {
          const observer = new ResizeObserver(reportHeight);
          observer.observe(document.body);
        }
        setTimeout(reportHeight, 50);
        setTimeout(reportHeight, 250);
        setTimeout(reportHeight, 800);
      }

      setupEmbedMode();
    </script>
  </body>
</html>
