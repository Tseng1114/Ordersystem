      function renderGrid(gridId, type) {
        const grid = document.getElementById(gridId);
        const entries = Object.entries(SHOPS).filter(
          ([, s]) => s.type === type,
        );
        entries.forEach(([key, s], i) => {
          const logoDir = type === "drinks" ? "drinks" : "meals";
          const el = document.createElement("div");
          el.className = "shop-card";
          el.style.animationDelay = `${i * 45}ms`;
          el.classList.add("anim-fade-up");
          el.innerHTML = `
            <img class="shop-logo" src="./logos/${logoDir}/${s.logo}" alt="${s.name}" />
            <div class="shop-info">
              <b>${s.name}</b>
              ${s.sub ? `<small>${s.sub}</small>` : ""}
            </div>`;
          el.addEventListener("click", () => openShop(key));
          grid.appendChild(el);
        });
      }

      renderGrid("drinkGrid", "drinks");
      renderGrid("foodGrid", "meals");

      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          document
            .querySelectorAll(".section-panel")
            .forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          const panel = document.getElementById(btn.dataset.target);
          panel.classList.add("active");
          panel.querySelectorAll(".shop-card").forEach((card, i) => {
            card.style.animation = "none";
            card.offsetHeight;
            card.style.animation = "";
            card.style.animationDelay = `${i * 40}ms`;
            card.classList.add("anim-fade-up");
          });

          const t = btn.dataset.target === "drinkPanel" ? "drink" : "food";
          history.replaceState(null, "", `menu.html?type=${t}`);
        });
      });

      function openShop(key) {
        const shop = SHOPS[key];
        if (!shop) return;
        if (shop.url) {
          window.open(shop.url, "_blank");
          return;
        }
        const suffix = IS_EMBED ? "&embed=1" : "";
        history.pushState({ shop: key }, "", `menu.html?shop=${key}${suffix}`);
        showMenuView(key);
      }

      function reportEmbedHeight() {
        if (!IS_EMBED || window.parent === window) return;
        const height = document.documentElement.scrollHeight;
        window.parent.postMessage({ type: "menu-embed-height", height }, "*");
      }

      function showMenuView(key) {
        const shop = SHOPS[key];
        document.title = shop.name + " 菜單 - 曾可愛家族點餐系統";
        document.getElementById("menuShopTitle").textContent = shop.name;
        const wrap = document.getElementById("menuImgs");
        wrap.innerHTML = "";

        shop.imgs.forEach((imgSrc, i) => {
          const el = document.createElement("img");
          el.src = `menus/${shop.type}/${imgSrc}`;
          el.alt = shop.name + " 菜單";
          el.title = "點擊放大";
          el.style.animationDelay = `${i * 80}ms`;
          el.classList.add("anim-scale-in");
          wrap.appendChild(el);
        });

        document.getElementById("listView").style.display = "none";
        document.getElementById("menuView").style.display = "block";
        document.querySelector(".footer").style.display = "none";
        if (!IS_EMBED) window.scrollTo(0, 0);
        reportEmbedHeight();
      }

      function showListView() {
        document.getElementById("menuView").style.display = "none";
        document.getElementById("listView").style.display = "block";
        document.querySelector(".footer").style.display = "";
        document.title = "菜單 - 曾可愛家族點餐系統";
      }

      document.getElementById("backBtn").addEventListener("click", () => {
        history.back();
      });

      window.addEventListener("popstate", (e) => {
        const params = new URLSearchParams(location.search);
        const shopKey = params.get("shop");
        const type = params.get("type");
        if (shopKey && SHOPS[shopKey]) {
          showMenuView(shopKey);
        } else {
          showListView();
          if (type === "food") document.getElementById("tabFood").click();
        }
      });

      (function init() {
        const params = new URLSearchParams(location.search);
        const shopKey = params.get("shop");
        const type = params.get("type");
        if (shopKey && SHOPS[shopKey]) {
          showMenuView(shopKey);
        } else {
          if (type === "food") document.getElementById("tabFood").click();
        }
      })();

      function syncStickyTop() {
        const nb = document.querySelector(".nb__bar");
        if (!nb) return;
        const h = nb.getBoundingClientRect().height + "px";
        const tabBar = document.querySelector(".tab-bar");
        const menuHeader = document.querySelector(".menu-header");
        if (tabBar) tabBar.style.top = h;
        if (menuHeader) menuHeader.style.top = h;
      }
      requestAnimationFrame(() => {
        syncStickyTop();
        window.addEventListener("resize", syncStickyTop);
      });

      document.addEventListener("click", (e) => {
        const a = e.target.closest("a[href]");
        if (!a) return;
        const url = new URL(a.href, location.href);
        if (url.pathname !== location.pathname) return;
        const type = url.searchParams.get("type");
        if (!type) return;
        e.preventDefault();
        showListView();
        if (type === "food") {
          document.getElementById("tabFood").click();
        } else {
          document.getElementById("tabDrink").click();
        }
        window.scrollTo(0, 0);
      });
    </script>

    <script>
      (function setupEmbedMode() {
        const params = new URLSearchParams(location.search);
        if (params.get("embed") !== "1") return;

        const navbarRoot = document.getElementById("navbar-root");
        const backBtn = document.getElementById("backBtn");
        const footer = document.querySelector(".footer");
        const listView = document.getElementById("listView");
        const menuView = document.getElementById("menuView");

        if (navbarRoot) navbarRoot.style.display = "none";
        if (backBtn) backBtn.style.display = "none";
        if (footer) footer.style.display = "none";
        if (listView) listView.style.display = "none";
        if (menuView) menuView.style.paddingTop = "0";

        const reportHeight = () => {
          if (window.parent === window) return;
          const height = document.documentElement.scrollHeight;
          window.parent.postMessage({ type: "menu-embed-height", height }, "*");
        };

        window.addEventListener("load", reportHeight);
        window.addEventListener("resize", reportHeight);

        if ("ResizeObserver" in window) {
          const observer = new ResizeObserver(reportHeight);
          observer.observe(document.body);
        }

        setTimeout(reportHeight, 50);
        setTimeout(reportHeight, 250);
        setTimeout(reportHeight, 800);
      })();
    </script>
