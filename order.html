<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>下單 - 曾可愛家族點餐系統</title>
    <link rel="stylesheet" href="css/order_style.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/loading.css" />
    <link rel="stylesheet" href="css/copyright_style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="wrap">
      <h1 class="page-title">下單</h1>
      <div class="card">
        <div id="expiredBanner" class="expired-banner">此訂單已截止，無法新增或送出訂單。</div>
        <div id="menuStatusBanner" class="menu-status-banner hidden"></div>

        <div id="orderForm">
          <table id="itemsTbl">
            <thead>
              <tr id="tableHeader">
                <th>姓名</th>
                <th id="itemName">品項</th>
                <th id="colAddon">加料</th>
                <th id="colSpecA">糖度</th>
                <th id="colSpecB">冰量</th>
                <th>數量</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>

          <div class="actions">
            <a href="index.html" class="back-home">回首頁</a>
            <button type="button" class="add" id="addItem">＋新增一筆</button>
            <button type="button" class="primary" id="submitBtn">
              送出訂單
            </button>
          </div>
        </div>

        <div id="successScreen" class="success-screen">
          <div class="success-icon">🎉</div>
          <h2>訂單送出成功！</h2>
          <p>你的點餐已記錄，可以前往彙整頁查看所有訂單。</p>
          <div class="actions">
            <a href="index.html" class="back-home">回首頁</a>
            <button type="button" class="primary" id="goSummaryBtn">查看訂單彙整</button>
          </div>
        </div>
      </div>
    </div>

    <div id="loadingOverlay">
      <div class="spinner-box">
        <div class="spinner"></div>
        <div class="spinner-text">處理中，請稍候...</div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2025 - 2026 曾可愛家族點餐系統</p>
        <p class="disclaimer">本站所有品牌標誌及菜單資訊之著作權均屬原公司所有。本系統為非營利開發練習，與上述品牌無官方關聯。</p>
      </div>
    </footer>

    <script type="module">
      import { supabase } from "./config.js";
      import { findShopByName } from "./shop-data.js";

      const urlParams = new URLSearchParams(window.location.search);
      const EVENT_ID = urlParams.get("event");
      let currentCategory = "drink";
      let currentShop = null;
      let isExpired = false;

      const SUGAR_OPTIONS = [
        "正常糖",
        "少糖",
        "半糖",
        "微糖",
        "二分糖",
        "一分糖",
        "無糖",
      ];
      const ICE_OPTIONS = [
        "正常冰",
        "少冰",
        "微冰",
        "去冰",
        "完全去冰",
        "常溫",
        "溫",
        "熱",
      ];

      function showLoading(s) {
        document.getElementById("loadingOverlay").style.display = s
          ? "block"
          : "none";
      }

      async function ensureEvent() {
        if (!EVENT_ID) return alert("無效訂單編號");
        showLoading(true);
        try {
          const { data: ev, error } = await supabase
            .from("events")
            .select("*")
            .eq("id", EVENT_ID)
            .single();

          if (error || !ev) return alert("找不到該訂單");

          currentCategory = ev.category || "drink";
          currentShop = findShopByName(ev.shop, currentCategory);
          document.querySelector(".page-title").textContent =
            ev.shop + " - 下單";
          renderMenuStatus();

          if (currentCategory === "food") {
            document.getElementById("itemName").textContent = "餐點名稱";
            document.getElementById("colAddon").textContent = "加點";
            document.getElementById("colSpecA").textContent = "份量";
            document.getElementById("colSpecB").textContent = "備註";
          }

          if (ev.deadline) {
            const now = new Date();
            const deadlineTime = new Date(ev.deadline);
            if (now > deadlineTime) {
              isExpired = true;
              const btn = document.getElementById("submitBtn");
              btn.disabled = true;
              btn.innerText = "已截止 (無法送出)";
              btn.classList.add("btn-disabled");
              document.getElementById("addItem").classList.add("hidden");
              document.getElementById("expiredBanner").classList.add("show");
            }
          }
        } finally {
          showLoading(false);
        }
      }

      function buildSelect(className, options, selectedValue) {
        return `
          <select class="${className}">
            ${options
              .map(
                (option) =>
                  `<option${option === selectedValue ? " selected" : ""}>${option}</option>`,
              )
              .join("")}
          </select>
        `;
      }

      function buildItemField() {
        const shopMeta = currentShop?.[1];
        const menuItems = shopMeta?.menuItems || [];

        if (menuItems.length > 0) {
          return `
            <select class="item-input" required>
              <option value="" selected disabled>請選擇品項</option>
              ${menuItems
                .map((item) => `<option value="${item}">${item}</option>`)
                .join("")}
            </select>
          `;
        }

        return '<input class="item-input" placeholder="請輸入名稱" required>';
      }

      function buildAddonField() {
        const shopMeta = currentShop?.[1];
        const addonOptions = shopMeta?.addonOptions || ["不加料"];

        if (currentCategory === "food") {
          return '<input class="addon-input" placeholder="加蛋/加麵等">';
        }

        return `
          <select class="addon-input">
            ${addonOptions
              .map((option) => `<option value="${option}">${option}</option>`)
              .join("")}
          </select>
        `;
      }

      function combineItemAndAddon(itemName, addonName) {
        const addon = addonName?.trim();
        if (!addon || addon === "不加料") return itemName;
        return `${itemName}（加料：${addon}）`;
      }

      function renderMenuStatus() {
        const banner = document.getElementById("menuStatusBanner");
        const [shopKey, shopMeta] = currentShop || [];

        if (!shopMeta) {
          banner.classList.add("hidden");
          banner.innerHTML = "";
          return;
        }

        const menuUrl = `menu.html?shop=${shopKey}`;
        const hasMenuItems = Array.isArray(shopMeta.menuItems) && shopMeta.menuItems.length > 0;

        if (hasMenuItems) {
          banner.innerHTML = `${shopMeta.name} 目前已套用下拉式品項清單。這份清單是先整理出的初版，仍可搭配 <a href="${menuUrl}" target="_blank" rel="noreferrer">菜單頁</a> 一起確認。`;
        } else {
          banner.innerHTML = `${shopMeta.name} 目前還沒有完整整理成下拉式品項，這一頁先保留手動輸入。你也可以先查看 <a href="${menuUrl}" target="_blank" rel="noreferrer">菜單頁</a>。`;
        }

        banner.classList.remove("hidden");
      }

      function addRow() {
        const tr = document.createElement("tr");
        let middleCols = "";

        if (currentCategory === "food") {
          middleCols = `
            <td data-label="加點"><input class="addon-input" placeholder="加蛋/加麵等"></td>
            <td data-label="份量"><input class="spec-a-input" placeholder="大/小,加麵等"></td>
            <td data-label="備註"><input class="spec-b-input" placeholder="不蔥/加辣等"></td>
          `;
        } else {
          middleCols = `
            <td data-label="加料">
              ${buildAddonField()}
            </td>
            <td data-label="糖度">
              ${buildSelect("spec-a-input", SUGAR_OPTIONS, "無糖")}
            </td>
            <td data-label="冰量">
              ${buildSelect("spec-b-input", ICE_OPTIONS, "完全去冰")}
            </td>
          `;
        }

        tr.innerHTML = `
          <td data-label="姓名"><input class="who" placeholder="姓名" required></td>
          <td data-label="品項">${buildItemField()}</td>
          ${middleCols}
          <td data-label="數量"><input class="qty" type="number" min="1" value="1"></td>
          <td><button type="button" class="del-btn" onclick="this.parentElement.parentElement.remove()">刪除此筆</button></td>
        `;
        document.querySelector("#itemsTbl tbody").appendChild(tr);
      }

      async function submitOrder() {
        if (isExpired) return;

        const trs = [...document.querySelectorAll("#itemsTbl tbody tr")];
        if (trs.length === 0) return alert("請至少新增一筆品項");

        const rows = trs.map((tr) => ({
          event_id: EVENT_ID,
          customer: tr.querySelector(".who").value.trim(),
          name: combineItemAndAddon(
            tr.querySelector(".item-input").value.trim(),
            tr.querySelector(".addon-input")?.value || "",
          ),
          suger: tr.querySelector(".spec-a-input").value,
          ice: tr.querySelector(".spec-b-input").value,
          qty: parseInt(tr.querySelector(".qty").value),
        }));

        if (rows.some((row) => !row.customer || !row.name)) {
          return alert("請完整填寫姓名與品項");
        }

        showLoading(true);
        try {
          const { error } = await supabase.from("orders").insert(rows);
          if (error) throw error;

          document.getElementById("orderForm").style.display = "none";
          document.getElementById("successScreen").style.display = "block";
          document.getElementById("goSummaryBtn").onclick = () => {
            location.href = `summary.html?event=${EVENT_ID}`;
          };
        } catch (err) {
          alert("送出失敗：" + err.message);
        } finally {
          showLoading(false);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        ensureEvent();
        document.getElementById("addItem").onclick = addRow;
        document.getElementById("submitBtn").onclick = submitOrder;
      });
    </script>
  </body>
</html>
