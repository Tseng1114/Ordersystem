<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#27374d" />
    <title>目前無法連線 - 曾可愛家族點餐系統</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #fff 0%, #f7fafc 55%, #edf3f7 100%);
        color: #27374d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }
      main {
        width: min(100%, 420px);
        padding: 32px 24px;
        border: 1px solid #dde6ed;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 48px rgba(39, 55, 77, 0.12);
      }
      .icon { margin: 0 auto 18px; width: 72px; height: 72px; }
      h1 { margin: 0 0 10px; font-size: 1.5rem; }
      p { margin: 0 0 22px; color: #526d82; line-height: 1.65; }
      button {
        min-height: 46px;
        padding: 0 24px;
        border: 0;
        border-radius: 999px;
        background: #27374d;
        color: #fff;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="icon" src="./icons/app-icon-192.png" alt="" />
      <h1>目前沒有網路連線</h1>
      <p>已瀏覽過的頁面仍可離線開啟；建立、修改或查詢訂單需要恢復網路連線。</p>
      <button type="button" onclick="location.reload()">重新連線</button>
    </main>
  </body>
</html>
