<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>查詢訂單 - 曾可愛家族點餐系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/navbar_style.css" />
    <link rel="stylesheet" href="css/loading.css" />
    <link rel="stylesheet" href="css/copyright_style.css" />
    <link rel="stylesheet" href="css/search_order_style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div id="navbar-root"></div>

    <div id="loadingOverlay">
      <div class="spinner-box">
        <div class="spinner"></div>
        <div class="spinner-text">查詢中，請稍候...</div>
      </div>
    </div>

    <div class="page-wrap">
      <h1 class="page-title">查詢訂單</h1>

      <div class="search-card">
        <label for="searchInput">輸入訂單編號</label>
        <div class="search-group">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="請貼上訂單編號..."
          />
          <button id="searchBtn" class="search-btn">輸入</button>
        </div>
      </div>

      <div id="resultArea">
        <div class="result-card">
          <div class="result-head">
            <h2 id="resShopName"></h2>
            <span id="resBadge" class="badge"></span>
          </div>
          <div class="id-row">
            <code id="resEventId"></code>
            <button class="copy-id-btn" id="copyIdBtn">複製</button>
          </div>
          <div class="meta-row">截止時間：<span id="resDeadline"></span></div>
          <hr class="divider" />
          <div id="resByPerson"></div>
          <div class="result-footer">
            <button class="btn btn-ghost" id="clearBtn">✕ 清除</button>
            <a id="editLink" class="btn btn-ghost" href="#">修改訂單</a>
            <a id="summaryLink" class="btn btn-dark" href="#">完整彙整</a>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2025 - 2026 曾可愛家族點餐系統</p>
        <p class="disclaimer">
          本站所有品牌標誌及菜單資訊之著作權均屬原公司所有。本系統為非營利開發練習，與上述品牌無官方關聯。
        </p>
      </div>
    </footer>

    <script type="module">
      import { initNavbar } from "./navbar.js";
      import { supabase } from "./config.js";
      initNavbar("lookup");

      function showLoading(s) {
        document.getElementById("loadingOverlay").style.display = s
          ? "flex"
          : "none";
      }

      function formatTW(iso) {
        if (!iso) return "無期限";
        return new Date(iso).toLocaleString("zh-TW", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          timeZone: "Asia/Taipei",
        });
      }

      function render(ev) {
        document.getElementById("resShopName").textContent = ev.shop;
        document.getElementById("resEventId").textContent = ev.id;
        document.getElementById("resDeadline").textContent = formatTW(
          ev.deadline,
        );
        document.getElementById("summaryLink").href =
          `summary.html?event=${ev.id}`;
        document.getElementById("editLink").href =
          `edit_order.html?event=${ev.id}`;

        const expired = ev.deadline && new Date(ev.deadline) < new Date();
        const badge = document.getElementById("resBadge");
        badge.textContent = expired ? "已截止" : "進行中";
        badge.className = "badge " + (expired ? "badge-closed" : "badge-open");

        const groups = {};
        (ev.orders || []).forEach((o) => {
          if (!groups[o.customer]) groups[o.customer] = [];
          groups[o.customer].push(o);
        });
        const con = document.getElementById("resByPerson");
        if (!Object.keys(groups).length) {
          con.innerHTML = '<div class="empty-state">目前尚無人下單。</div>';
        } else {
          con.innerHTML = Object.entries(groups)
            .map(
              ([name, items]) => `
            <div class="person-block">
              <div class="person-name">${name}</div>
              ${items
                .map(
                  (o) => `
                <div class="order-item">
                  <div>
                    <div class="order-item-name">${o.name}</div>
                    <div class="order-item-spec">${o.suger || o.spec_a || ""}／${o.ice || o.spec_b || ""}</div>
                  </div>
                  <span class="order-item-qty">x${o.qty}</span>
                </div>`,
                )
                .join("")}
            </div>`,
            )
            .join("");
        }
        document.getElementById("resultArea").style.display = "block";
      }

      async function doSearch() {
        const id = document.getElementById("searchInput").value.trim();
        if (!id) return alert("請輸入訂單編號");
        showLoading(true);
        try {
          const { data, error } = await supabase
            .from("events")
            .select("*, orders(*)")
            .eq("id", id)
            .single();
          if (error || !data) {
            alert("找不到此訂單，請確認編號是否正確。");
            return;
          }
          render(data);
        } catch (e) {
          alert("查詢失敗：" + e.message);
        } finally {
          showLoading(false);
        }
      }

      document.getElementById("searchBtn").onclick = doSearch;
      document
        .getElementById("searchInput")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") doSearch();
        });
      document.getElementById("clearBtn").onclick = () => {
        document.getElementById("resultArea").style.display = "none";
        document.getElementById("searchInput").value = "";
      };
      document.getElementById("copyIdBtn").onclick = () => {
        navigator.clipboard
          .writeText(document.getElementById("resEventId").textContent)
          .then(() => {
            const btn = document.getElementById("copyIdBtn");
            btn.textContent = "✓";
            setTimeout(() => (btn.textContent = "複製"), 1800);
          });
      };

      const urlEvent = new URLSearchParams(location.search).get("event");
      if (urlEvent) {
        document.getElementById("searchInput").value = urlEvent;
        doSearch();
      }
    </script>
  </body>
</html>
