<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#27374d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="家族點餐" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <script type="module" src="./js/pwa.js"></script>
    <title>查詢訂單 - 曾可愛家族點餐系統</title>
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/loading.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/order_lookup.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <div id="loadingOverlay">
      <div class="spinner-box">
        <div class="spinner"></div>
        <div class="spinner-text">查詢中...</div>
      </div>
    </div>

    <div class="page-wrap order-lookup-wrap">
      <h1 class="page-title anim-fade-up">查詢訂單</h1>

      <div class="search-card lookup-card order-code-card anim-fade-up anim-fade-up-d1">
        <div class="search-group lookup-row order-code-group">
          <input
            id="searchInput"
            class="search-input id-input"
            type="text"
            placeholder="輸入訂單代碼"
          />
          <button id="searchBtn" class="search-btn btn-primary">查詢</button>
        </div>
      </div>

      <div id="resultArea">
        <div class="result-card anim-scale-in">
          <div class="result-head">
            <h2 id="resShopName"></h2>
            <span id="resBadge" class="badge"></span>
          </div>
          <div class="id-row">
            <code id="resEventId"></code>
            <button class="copy-id-btn" id="copyIdBtn">複製</button>
          </div>
          <div class="meta-row">截止時間：<span id="resDeadline"></span></div>
          <hr class="divider" />
          <div id="resByPerson"></div>
          <div class="result-footer">
            <button class="btn btn-ghost" id="clearBtn">清除結果</button>
            <a id="summaryLink" class="btn btn-dark" href="#">完整彙整</a>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2025 - 2026 曾可愛家族點餐系統</p>
        <p class="disclaimer">本站所有品牌標誌及菜單資訊之著作權均屬原公司所有。本系統為非營利開發練習，與上述品牌無官方關聯。</p>
      </div>
    </footer>

    <script type="module">
      import { initNavbar } from "./js/navbar.js";
      import { getEventSecure, normalizeAccessToken } from "./js/event-api.js";
      import { showToast, initRipple, copyText, escapeHtml, formatTaipeiDateTime, getQueryParam, setLoadingVisible } from "./js/ui-utils.js";

      initNavbar("lookup");
      initRipple(".search-btn, .btn, .copy-id-btn");

      const esc = escapeHtml;

      const showLoading = setLoadingVisible;

      const formatTW = formatTaipeiDateTime;

      function render(ev, accessToken) {
        document.getElementById("resShopName").textContent = ev.shop;
        document.getElementById("resEventId").textContent = accessToken;
        document.getElementById("resDeadline").textContent = formatTW(ev.deadline);
        document.getElementById("summaryLink").href = `summary.html?event=${accessToken}`;

        const expired = ev.deadline && new Date(ev.deadline) < new Date();
        const badge = document.getElementById("resBadge");
        badge.textContent = expired ? "已截止" : "進行中";
        badge.className = "badge " + (expired ? "badge-closed" : "badge-open");

        const groups = {};
        (ev.orders || []).forEach((order) => {
          if (!groups[order.customer]) groups[order.customer] = [];
          groups[order.customer].push(order);
        });

        const container = document.getElementById("resByPerson");
        if (!Object.keys(groups).length) {
          container.innerHTML = '<div class="empty-state">目前還沒有訂單。</div>';
        } else {
          container.innerHTML = Object.entries(groups)
            .map(([name, items], gi) => `
              <div class="person-block anim-fade-up" style="animation-delay:${gi * 50}ms">
                <div class="person-name">${esc(name)}</div>
                ${items.map((order) => `
                  <div class="order-item">
                    <div>
                      <div class="order-item-name">${esc(order.name)}</div>
                      <div class="order-item-spec">${esc(order.suger || order.spec_a || "")} / ${esc(order.ice || order.spec_b || "")}</div>
                    </div>
                    <span class="order-item-qty">x${esc(order.qty)}</span>
                  </div>
                `).join("")}
              </div>
            `).join("");
        }

        const resultArea = document.getElementById("resultArea");
        resultArea.style.display = "block";
        const card = resultArea.querySelector(".result-card");
        card.style.animation = "none";
        card.offsetHeight;
        card.style.animation = "";
        card.classList.add("anim-scale-in");
      }

      async function doSearch() {
        const accessToken = normalizeAccessToken(document.getElementById("searchInput").value);
        if (!accessToken) {
          showToast("請先輸入訂單代碼", "warning");
          return;
        }

        showLoading(true);
        try {
          const data = await getEventSecure(accessToken);
          render(data, accessToken);
          showToast("查詢成功", "success");
        } catch (error) {
          showToast(`查詢失敗：${error.message}`, "error", 5000);
        } finally {
          showLoading(false);
        }
      }

      document.getElementById("searchBtn").onclick = doSearch;
      document.getElementById("searchInput").addEventListener("keypress", (event) => {
        if (event.key === "Enter") doSearch();
      });

      document.getElementById("clearBtn").onclick = () => {
        document.getElementById("resultArea").style.display = "none";
        document.getElementById("searchInput").value = "";
      };

      document.getElementById("copyIdBtn").onclick = async () => {
        await copyText(document.getElementById("resEventId").textContent, "訂單代碼已複製");
        const btn = document.getElementById("copyIdBtn");
        btn.textContent = "已複製 ✓";
        setTimeout(() => { btn.textContent = "複製"; }, 1800);
      };

      const urlEvent = getQueryParam("event");
      if (urlEvent) {
        document.getElementById("searchInput").value = urlEvent;
        doSearch();
      }
    </script>
  </body>
</html>
