<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>訂單彙整 - 曾可愛家族點餐系統</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/summary_style.css" />
    <link rel="stylesheet" href="css/loading.css" />
    <link rel="stylesheet" href="css/copyright_style.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <div class="marquee-bar">
      <div class="marquee-content">⚠️ 系統不會儲存您的訂單編號，請務必點擊下方按鈕「複製編號」並妥善保存，以便日後查詢訂單明細！ ⚠️</div>
    </div>

    <div id="loadingOverlay">
      <div class="spinner-box">
        <div class="spinner"></div>
        <div class="spinner-text">正在讀取該訂單...</div>
      </div>
    </div>

    <div class="wrap">
      <div class="card anim-fade-up">
        <h1 class="page-title">
          訂單彙整
          <span class="realtime-badge connecting" id="realtimeBadge">
            <span class="realtime-dot"></span>
            <span id="realtimeLabel">連線中</span>
          </span>
        </h1>

        <div class="id-copy-section anim-fade-up anim-fade-up-d1">
          <div class="id-label">訂單編號</div>
          <div class="id-display-row">
            <span id="targetOrderId">載入中...</span>
            <button id="btnCopy" class="copy-action-btn">複製編號</button>
          </div>
          <div id="copyToast" class="copy-toast">已複製到剪貼簿</div>
        </div>

        <div id="eventInfo"></div>

        <div id="byPersonBox" class="by-person">
          <div class="summary-tabs anim-fade-up anim-fade-up-d2">
            <button class="summary-tab active" id="tabByPerson">依人統計</button>
            <button class="summary-tab" id="tabByItem">依品項統計</button>
          </div>
          <div id="byPersonList"></div>
          <div id="byItemList" class="hidden"></div>
        </div>

        <div class="actions anim-fade-up anim-fade-up-d3">
          <a href="index.html" class="back-home">回首頁</a>
          <button id="btnReload" type="button" class="back-home">重新整理資料</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>© 2025 - 2026 曾可愛家族點餐系統</p>
        <p class="disclaimer">本站所有品牌標誌及菜單資訊之著作權均屬原公司所有。本系統為非營利開發練習，與上述品牌無官方關聯。</p>
      </div>
    </footer>

    <script type="module">
      import { supabase } from "./config.js";
      import { getEventCode, getResolveEventMessage, resolveEventId } from "./event-utils.js";
      import { initNavbar } from "./navbar.js";
      import { showToast, overrideAlert, initRipple, countUp, skeletonCards } from "./ui-utils.js";

      initNavbar();
      overrideAlert();
      initRipple(".back-home, .copy-action-btn, .summary-tab, #btnReload");

      function esc(str) {
        return String(str ?? "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }

      const rawEventId = new URLSearchParams(location.search).get("event");
      let resolvedEventId = null;
      let displayEventCode = rawEventId || "";
      let allOrders = [];        
      let realtimeChannel = null;  
      let currentTab = "person";   

      const btnCopy = document.getElementById("btnCopy");
      const copyToast = document.getElementById("copyToast");
      const targetOrderId = document.getElementById("targetOrderId");
      const realtimeBadge = document.getElementById("realtimeBadge");
      const realtimeLabel = document.getElementById("realtimeLabel");

      btnCopy.onclick = () => {
        if (!displayEventCode) return;
        navigator.clipboard.writeText(displayEventCode).then(() => {
          copyToast.style.display = "block";
          btnCopy.innerText = "已複製 ✓";
          showToast("訂單編號已複製到剪貼簿", "success");
          setTimeout(() => {
            copyToast.style.display = "none";
            btnCopy.innerText = "複製編號";
          }, 2000);
        });
      };

      function showLoading(show) {
        document.getElementById("loadingOverlay").style.display = show ? "flex" : "none";
      }

      function formatTWTime(isoString) {
        if (!isoString) return "無限制";
        return new Date(isoString).toLocaleString("zh-TW", {
          year: "numeric", month: "2-digit", day: "2-digit",
          hour: "2-digit", minute: "2-digit", hour12: false,
          timeZone: "Asia/Taipei",
        });
      }

      function setRealtimeStatus(status) {
        realtimeBadge.className = "realtime-badge";
        if (status === "connected") {
          realtimeBadge.classList.add();   
          realtimeLabel.textContent = "即時同步中";
        } else if (status === "connecting") {
          realtimeBadge.classList.add("connecting");
          realtimeLabel.textContent = "連線中";
        } else {
          realtimeBadge.classList.add("error");
          realtimeLabel.textContent = "已中斷";
        }
      }

      function renderByPerson(orders, highlightId = null) {
        const listEl = document.getElementById("byPersonList");
        listEl.innerHTML = "";

        if (!orders.length) {
          listEl.innerHTML = '<p class="state-empty">目前尚無人下單。</p>';
          return;
        }

        const groups = {};
        orders.forEach((o) => {
          if (!groups[o.customer]) groups[o.customer] = [];
          groups[o.customer].push(o);
        });

        Object.keys(groups).sort().forEach((name, gi) => {
          const items = groups[name]
            .map((o) => `
              <li>
                <span>${esc(o.name)} (${esc(o.suger)}／${esc(o.ice)})</span>
                <span style="font-weight:bold;">x${o.qty}</span>
              </li>`)
            .join("");
          const div = document.createElement("div");
          div.className = "person anim-fade-up";
          div.style.animationDelay = `${gi * 50}ms`;
          if (highlightId && groups[name].some((o) => o.id === highlightId)) {
            div.classList.add("new-entry");
          }
          div.innerHTML = `<h4>${esc(name)}</h4><ul>${items}</ul>`;
          listEl.appendChild(div);
        });
      }

      function renderByItem(orders) {
        const itemListEl = document.getElementById("byItemList");
        itemListEl.innerHTML = "";

        if (!orders.length) {
          itemListEl.innerHTML = '<p class="state-empty">目前尚無人下單。</p>';
          return;
        }

        const itemGroups = {};
        orders.forEach((o) => {
          const key = `${o.name}__${o.suger}__${o.ice}`;
          if (!itemGroups[key]) itemGroups[key] = { name: o.name, suger: o.suger, ice: o.ice, qty: 0 };
          itemGroups[key].qty += o.qty;
        });

        Object.values(itemGroups)
          .sort((a, b) => b.qty - a.qty)
          .forEach((item, ii) => {
            const div = document.createElement("div");
            div.className = "person anim-fade-up";
            div.style.animationDelay = `${ii * 50}ms`;
            const qtySpan = `<span class="order-qty count-target" data-target="${item.qty}">0</span>`;
            div.innerHTML = `
              <h4>${esc(item.name)}</h4>
              <ul><li>
                <span>${esc(item.suger)}／${esc(item.ice)}</span>
                <span class="order-qty">x${qtySpan}</span>
              </li></ul>`;
            itemListEl.appendChild(div);
          });
      }

      function setupTabs() {
        document.getElementById("tabByPerson").onclick = () => {
          currentTab = "person";
          document.getElementById("byPersonList").classList.remove("hidden");
          document.getElementById("byItemList").classList.add("hidden");
          document.getElementById("tabByPerson").classList.add("active");
          document.getElementById("tabByItem").classList.remove("active");
        };
        document.getElementById("tabByItem").onclick = () => {
          currentTab = "item";
          document.getElementById("byItemList").classList.remove("hidden");
          document.getElementById("byPersonList").classList.add("hidden");
          document.getElementById("tabByItem").classList.add("active");
          document.getElementById("tabByPerson").classList.remove("active");
          document.querySelectorAll(".count-target").forEach((el) => {
            const target = parseInt(el.dataset.target, 10);
            countUp(el, target, 500);
          });
        };
      }

      function handleNewOrder(newOrder) {
        if (allOrders.some((o) => o.id === newOrder.id)) return;
        allOrders.push(newOrder);

        renderByPerson(allOrders, newOrder.id);
        renderByItem(allOrders);

        if (currentTab === "item") {
          document.querySelectorAll(".count-target").forEach((el) => {
            const target = parseInt(el.dataset.target, 10);
            countUp(el, target, 400);
          });
        }

        showToast(`${newOrder.customer} 新增了一筆訂單`, "info");
      }

      function handleDeleteOrder(oldOrder) {
        allOrders = allOrders.filter((o) => o.id !== oldOrder.id);
        renderByPerson(allOrders);
        renderByItem(allOrders);
        if (currentTab === "item") {
          document.querySelectorAll(".count-target").forEach((el) => {
            const target = parseInt(el.dataset.target, 10);
            countUp(el, target, 400);
          });
        }
        showToast("有一筆訂單被刪除", "warning");
      }

      function handleUpdateOrder(updatedOrder) {
        const idx = allOrders.findIndex((o) => o.id === updatedOrder.id);
        if (idx !== -1) allOrders[idx] = updatedOrder;
        renderByPerson(allOrders);
        renderByItem(allOrders);
      }

      function subscribeRealtime(eventId) {
        if (realtimeChannel) {
          supabase.removeChannel(realtimeChannel);
        }

        setRealtimeStatus("connecting");

        realtimeChannel = supabase
          .channel(`orders-${eventId}`)
          .on(
            "postgres_changes",
            {
              event: "INSERT",
              schema: "public",
              table: "orders",
              filter: `event_id=eq.${eventId}`,
            },
            (payload) => handleNewOrder(payload.new)
          )
          .on(
            "postgres_changes",
            {
              event: "DELETE",
              schema: "public",
              table: "orders",
              filter: `event_id=eq.${eventId}`,
            },
            (payload) => handleDeleteOrder(payload.old)
          )
          .on(
            "postgres_changes",
            {
              event: "UPDATE",
              schema: "public",
              table: "orders",
              filter: `event_id=eq.${eventId}`,
            },
            (payload) => handleUpdateOrder(payload.new)
          )
          .subscribe((status) => {
            if (status === "SUBSCRIBED") {
              setRealtimeStatus("connected");
            } else if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
              setRealtimeStatus("error");
              showToast("即時同步連線失敗，請手動重新整理", "error", 5000);
            }
          });
      }

      async function load() {
        if (!rawEventId) {
          showToast("網址缺少訂單編號，請重新從首頁進入。", "error", 5000);
          setTimeout(() => { location.href = "index.html"; }, 2000);
          return;
        }

        showLoading(true);
        document.getElementById("byPersonList").innerHTML = skeletonCards(3);

        try {
          const resolved = await resolveEventId(supabase, rawEventId);
          if (!resolved.id) {
            document.getElementById("eventInfo").innerHTML =
              `<p class="state-error">${getResolveEventMessage(resolved.reason)}</p>`;
            showToast(getResolveEventMessage(resolved.reason), "error");
            return;
          }
          resolvedEventId = resolved.id;

          const { data: results, error } = await supabase
            .from("events")
            .select("*, orders(*)")
            .eq("id", resolvedEventId);

          if (error) throw error;
          if (!results || results.length === 0) {
            document.getElementById("eventInfo").innerHTML =
              `<p class="state-error">找不到此活動。</p>`;
            return;
          }

          const ev = results[0];
          displayEventCode = getEventCode(ev.id);
          targetOrderId.innerText = displayEventCode;
          document.getElementById("eventInfo").innerHTML = `
            <div class="meta-container anim-scale-in">
              <h2 class="meta-shop">${esc(ev.shop)}</h2>
              <p class="meta-deadline">截止時間：${formatTWTime(ev.deadline)}</p>
            </div>`;

          allOrders = ev.orders || [];
          renderByPerson(allOrders);
          renderByItem(allOrders);
          setupTabs();

          subscribeRealtime(resolvedEventId);

          showToast(`已讀取 ${allOrders.length} 筆訂單`, "success");

        } catch (err) {
          showToast("讀取失敗：" + err.message, "error", 5000);
        } finally {
          showLoading(false);
        }
      }

      document.getElementById("btnReload").onclick = () => load();
      document.addEventListener("DOMContentLoaded", load);

      window.addEventListener("beforeunload", () => {
        if (realtimeChannel) supabase.removeChannel(realtimeChannel);
      });
    </script>
  </body>
</html>
